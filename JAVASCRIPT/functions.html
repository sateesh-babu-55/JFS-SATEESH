        <script>
            /*
                functions
                *********
                    particular business logic called as function
                           (or)
                    set of statements also called as "function"

                    functions are used to "reuse" the business logic

                    types
                    *****
                    1) function declaration / named functions
                    2) function expression / anonymous functions
                    3) arrow functions
                    4) constructor functions
                    5) callback functions
                    6) generator functions
                    7) IIFE (Immidiate Invokable Functional Expression)
                    8) higher order functions
                    9) pure functions

                    function declaration / named functions
                    ************************************** 
                        function with particular name (user defined name) called as function declaration / named functions

                    syntax.
                        function declaration
                        ********************
                        function functionname(param1,param2,param3,....param n){
                            business logic
                        }
                        call the function
                        *****************
                        functionname(arg1,arg2,arg3,.....arg n);

                    function expression / anonymous function
                    ****************************************
                        function without particular name called as function expression / anonymous function
                        syntax.
                            function expression
                            ********************
                            let functionname = function(param1,param2,param3,....param n){
                                business logic
                            }
                            call the function
                            *****************
                            functionname(arg1,arg2,arg3,.....arg n);

                    arrow functions
                    ***************
                        we will represent arrow functions with =>
                        arrow functions released in ES6
                        arrow functions simplifies the business logic
                        syntax.
                            function expression
                            ********************
                            let functionname = (param1,param2,param3,....param n)=>{
                                business logic
                            }
                            call the function
                            *****************
                            functionname(arg1,arg2,arg3,.....arg n);

                    Note : we are able to map function expression and arrow functions with the help of variables
            */
        </script>
