<!DOCTYPE html>
<html>
    <head>
        <title>Event Bubbling & Event Capturing</title>
        <style>
            .parent{
                width: 200px;
                height: 200px;
                border: 1px solid red;
                text-align: center;
            }
            .child{
                width: 150px;
                height: 150px;
                border: 1px solid green;
                margin-left: 25px;
            }
            .subchild{
                width: 100px;
                height: 100px;
                border: 1px solid blue;
                margin-left: 25px;
            }
        </style>
    </head>
    <body>
        <div class="parent">
            Parent
            <div class="child">
                Child
                <div class="subchild">
                    subchild
                </div>
            </div>
        </div>
        <!-- <script>
            document.querySelector(".parent").addEventListener("click",()=>{
                    console.log("parent");
            });
            document.querySelector(".child").addEventListener("click",(event)=>{
                    event.stopPropagation();
                    console.log("child");
            });
            document.querySelector(".subchild").addEventListener("click",()=>{
                    console.log("subchild");
            });
        </script> -->


        <script>
            document.querySelector(".parent").addEventListener("click",()=>{
                    console.log("parent");
            },true);
            document.querySelector(".child").addEventListener("click",(event)=>{
                    //event.stopPropagation();
                    console.log("child");
            },true);
            document.querySelector(".subchild").addEventListener("click",()=>{
                    console.log("subchild");
            },true);
        </script>



    </body>
</html>
