<!DOCTYPE html>

    <head>
        <title>DOM Manipulations</title>
        <style>
            .c1{
                color: green;
            }
            .c2{
                color: red;
            }
        </style>
    </head>
    <body>
        <ul id="my_ul"></ul>

        <script>
            let frag = document.createDocumentFragment();
            for(let i=0;i<5;i++){
                 let li = document.createElement("li");
                 li.textContent = "Text "+i;
                 frag.appendChild(li);
            }
            ul = document.getElementById("my_ul");
            ul.appendChild(frag);
        </script>
