<!DOCTYPE html>
<html>
    <head>
        <title>BootStrap buttons</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container mt-5">
            <button class="btn btn-primary"> Button1</button>
            <button class="btn btn-secondary"> Button2</button>
            <button class="btn btn-success"> Button3</button>
            <button class="btn btn-danger"> Button4</button>
            <button class="btn btn-light"> Button5</button>
            <button class="btn btn-dark"> Button6</button>
            <button class="btn btn-info"> Button7</button>
            <button class="btn btn-warning"> Button8</button>
            <hr>
            <button class="btn btn-outline-primary">Button1</button>
            <button class="btn btn-outline-secondary">Button2</button>
            <button class="btn btn-outline-warning">Button3</button>
            <button class="btn btn-outline-success">Button4</button>
            <button class="btn btn-outline-danger">Button5</button>
            <button class="btn btn-outline-dark">Button6</button>
            <button class="btn btn-outline-light">Button7</button>
            <button class="btn btn-outline-info">Button8</button>
            <hr>
            <button class="btn btn-danger btn-lg">Button</button>
            <button class="btn btn-dark btn-sm">Button</button>
            <hr>
            <button class="btn btn-link">link</button>  
        </div>
    </body>
</html>
