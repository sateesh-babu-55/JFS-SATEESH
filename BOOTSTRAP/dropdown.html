<!DOCTYPE html>
<html>
    <head>
        <title>Bootstrap-Dropdown</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
            rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container mt-5">
            <div class="dropdown">
                <button class="btn btn-success btn-lg dropdown-toggle" data-bs-toggle="dropdown">ClickMe</button>
                <ul class="dropdown-menu">
                    <li class="dropdown-item">Option1</li>
                    <li class="dropdown-item">Option2</li>
                    <li class="dropdown-item">Option3</li>
                    <li class="dropdown-item">Option4</li>
                </ul>
            </div>
        </div>
    </body>
</html>
