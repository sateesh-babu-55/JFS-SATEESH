<!DOCTYPE html>
<html>
    <head>
        <title>Bootstrap-modal</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container mt-5">
            <button class="btn btn-success btn-lg" data-bs-target="#parent">
                Lanch Modal
            </button>
        <div class="modal fade" id="parent" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">CareerIT</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Facere, officia?</p>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-success btn-sm">Yes</button>
                         <button class="btn btn-danger btn-sm" data-bs-dismiss="modal">No</button>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </body>
</html>
