<!DOCTYPE html>
<html>
    <head>
        <title>Bootstrap-Offcanvas</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
            rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    </head>
    <body>
        <a class="btn btn-success" data-bs-toggle="offcanvas" href="#div1">ClickMe</a>
        <div id="div1" class="offcanvas offcanvas-start" tabindex="-1">
            <div class="offcanvas-header">
                <h5 class="offcanvas-header">CareerIT</h5>
                <button class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nam corrupti ipsam quam consequuntur aut commodi et impedit culpa. Expedita totam quam magni quidem neque! Obcaecati voluptas eligendi delectus nisi ea!</p>
            </div>
        </div>
        
    </body>
</html>
